<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>API Reference — Community Feed</title>
  <meta name="description" content="Complete API reference for the Community-Governed Bluesky Feed Generator at corgi.network." />
  <link rel="icon" href="https://corgi.network/favicon.ico" />
  <link rel="apple-touch-icon" href="https://corgi.network/apple-touch-icon.png" />
  <style>
    /* ── Design tokens (from web/src/styles/tokens.css) ───── */
    :root {
      --bg-app: #161718;
      --bg-card: #1e1f21;
      --bg-elevated: #252729;
      --bg-hover: #2a2c2e;
      --border-default: #2e3033;
      --text-primary: #f1f3f5;
      --text-secondary: #828689;
      --text-muted: #6b6e70;
      --accent-blue: #1083fe;
      --accent-blue-hover: #0a74e8;
      --accent-blue-subtle: rgba(16, 131, 254, 0.15);
      --font-sans: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: var(--font-sans);
      background: var(--bg-app);
      color: var(--text-primary);
      -webkit-font-smoothing: antialiased;
    }

    /* ── Top navigation bar (matches dashboard-header) ──── */
    .top-bar {
      background: var(--bg-card);
      border-bottom: 1px solid var(--border-default);
      padding: 16px 24px;
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .top-bar-inner {
      max-width: 900px;
      margin: 0 auto;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .top-bar-left {
      display: flex;
      align-items: center;
      gap: 32px;
    }

    .top-bar-title {
      font-size: 20px;
      font-weight: 600;
      color: var(--text-primary);
      text-decoration: none;
      white-space: nowrap;
    }

    .top-bar-title:hover {
      color: var(--text-primary);
    }

    .top-bar-nav {
      display: flex;
      gap: 4px;
    }

    .nav-link {
      padding: 8px 16px;
      border-radius: 8px;
      color: var(--text-secondary);
      font-size: 13px;
      font-weight: 500;
      text-decoration: none;
      transition: all 150ms ease;
    }

    .nav-link:hover {
      color: var(--text-primary);
      background: var(--bg-hover);
    }

    .nav-link.active {
      color: var(--accent-blue);
      background: var(--accent-blue-subtle);
    }

    .top-bar-right {
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .github-link {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 13px;
      font-weight: 500;
      color: var(--text-secondary);
      text-decoration: none;
      padding: 8px 16px;
      border: 1px solid var(--border-default);
      border-radius: 8px;
      transition: all 150ms ease;
    }

    .github-link:hover {
      background: var(--bg-hover);
      border-color: var(--border-default);
      color: var(--text-primary);
    }

    .github-link svg {
      width: 16px;
      height: 16px;
      fill: currentColor;
    }

    /* ── Redoc container ──────────────────────────────────── */
    #redoc-container {
      min-height: calc(100vh - 60px);
    }

    /* ── Mobile adjustments ───────────────────────────────── */
    @media (max-width: 640px) {
      .top-bar { padding: 12px 16px; }
      .top-bar-left { gap: 16px; }
      .top-bar-title { font-size: 16px; }
      .top-bar-nav { display: none; }
      .top-bar-right { gap: 8px; }
    }
  </style>
</head>
<body>
  <!-- Top navigation (matches feed.corgi.network/dashboard header) -->
  <nav class="top-bar">
    <div class="top-bar-inner">
      <div class="top-bar-left">
        <a class="top-bar-title" href="https://feed.corgi.network">Community feed</a>
        <div class="top-bar-nav">
          <a class="nav-link" href="https://feed.corgi.network/vote">Vote</a>
          <a class="nav-link" href="https://feed.corgi.network/dashboard">Dashboard</a>
          <a class="nav-link" href="https://feed.corgi.network/history">History</a>
          <a class="nav-link active" href="https://docs.corgi.network">API Docs</a>
        </div>
      </div>
      <div class="top-bar-right">
        <a class="github-link" href="https://github.com/AndrewNordstrom/bluesky-community-feed" target="_blank" rel="noopener">
          <svg viewBox="0 0 16 16" xmlns="http://www.w3.org/2000/svg"><path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0016 8c0-4.42-3.58-8-8-8z"/></svg>
          GitHub
        </a>
      </div>
    </div>
  </nav>

  <!-- Redoc API documentation -->
  <div id="redoc-container"></div>

  <script src="https://cdn.redoc.ly/redoc/latest/bundles/redoc.standalone.js"></script>
  <script>
    Redoc.init('./openapi.json', {
      theme: {
        colors: {
          primary: { main: '#1083fe' },
          success: { main: '#34c759' },
          warning: { main: '#ff9f0a' },
          error: { main: '#ff453a' },
          text: {
            primary: '#f1f3f5',
            secondary: '#828689',
          },
          http: {
            get: '#34c759',
            post: '#1083fe',
            put: '#ff9f0a',
            delete: '#ff453a',
            patch: '#a855f7',
          },
        },
        typography: {
          fontFamily: '-apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif',
          fontSize: '15px',
          headings: {
            fontFamily: '-apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif',
            fontWeight: '600',
          },
          code: {
            fontFamily: '"SF Mono", "Fira Code", "Fira Mono", Menlo, Consolas, "DejaVu Sans Mono", monospace',
            fontSize: '13px',
            backgroundColor: '#252729',
            wrap: true,
          },
          links: {
            color: '#1083fe',
          },
        },
        sidebar: {
          width: '280px',
          backgroundColor: '#161718',
          textColor: '#828689',
          activeTextColor: '#f1f3f5',
          groupItems: {
            activeBackgroundColor: '#252729',
            activeTextColor: '#f1f3f5',
            textTransform: 'none',
          },
          level1Items: {
            activeBackgroundColor: 'rgba(16, 131, 254, 0.15)',
            activeTextColor: '#1083fe',
            textTransform: 'none',
          },
          arrow: {
            color: '#6b6e70',
          },
        },
        rightPanel: {
          backgroundColor: '#1e1f21',
          textColor: '#f1f3f5',
        },
        schema: {
          nestedBackground: '#252729',
          linesColor: '#2e3033',
          typeNameColor: '#1083fe',
          typeTitleColor: '#f1f3f5',
          requireLabelColor: '#ff453a',
        },
        codeBlock: {
          backgroundColor: '#161718',
        },
      },
      expandResponses: '200',
      hideDownloadButton: false,
      sortPropsAlphabetically: false,
      pathInMiddlePanel: true,
      hideHostname: false,
      nativeScrollbars: false,
      requiredPropsFirst: true,
      showExtensions: false,
      jsonSampleExpandLevel: 2,
    }, document.getElementById('redoc-container'));
  </script>
</body>
</html>
