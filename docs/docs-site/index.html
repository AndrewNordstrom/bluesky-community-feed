<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>API Reference — Corgi Network</title>
  <meta name="description" content="Complete API reference for the Community-Governed Bluesky Feed Generator at corgi.network." />
  <link rel="icon" href="https://corgi.network/favicon.ico" />
  <link rel="apple-touch-icon" href="https://corgi.network/apple-touch-icon.png" />
  <style>
    :root {
      --bg-app: #0a0a0a;
      --bg-card: #161718;
      --bg-elevated: #1e1f21;
      --text-primary: #f1f3f5;
      --text-secondary: #9ca3af;
      --text-muted: #6b6e70;
      --accent: #FF5722;
      --accent-hover: #e64a19;
      --border: #2e3033;
      --font-sans: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: var(--font-sans);
      background: var(--bg-app);
      color: var(--text-primary);
      -webkit-font-smoothing: antialiased;
    }

    /* ── Top navigation bar ───────────────────────────────── */
    .top-bar {
      position: sticky;
      top: 0;
      z-index: 100;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 24px;
      height: 56px;
      background: rgba(10, 10, 10, 0.92);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
    }

    .top-bar-left {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .corgi-logo {
      width: 32px;
      height: 32px;
    }

    .top-bar-title {
      font-size: 15px;
      font-weight: 600;
      color: var(--text-primary);
      text-decoration: none;
    }

    .top-bar-title:hover { color: var(--accent); }

    .top-bar-sep {
      color: var(--text-muted);
      font-weight: 300;
      font-size: 20px;
      margin: 0 2px;
    }

    .top-bar-subtitle {
      font-size: 14px;
      font-weight: 400;
      color: var(--text-secondary);
    }

    .top-bar-links {
      display: flex;
      align-items: center;
      gap: 20px;
    }

    .top-bar-links a {
      font-size: 13px;
      color: var(--text-secondary);
      text-decoration: none;
      transition: color 0.15s ease;
    }

    .top-bar-links a:hover { color: var(--text-primary); }

    .github-link {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .github-link svg {
      width: 16px;
      height: 16px;
      fill: var(--text-secondary);
      transition: fill 0.15s ease;
    }

    .github-link:hover svg { fill: var(--text-primary); }

    /* ── Redoc container ──────────────────────────────────── */
    #redoc-container {
      min-height: calc(100vh - 56px);
    }

    /* ── Mobile adjustments ───────────────────────────────── */
    @media (max-width: 640px) {
      .top-bar { padding: 0 16px; }
      .top-bar-links { gap: 12px; }
      .top-bar-sep, .top-bar-subtitle { display: none; }
    }
  </style>
</head>
